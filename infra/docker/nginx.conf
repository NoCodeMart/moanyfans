resolver 1.1.1.1 1.0.0.1 ipv6=off valid=300s;
resolver_timeout 5s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
  gzip_min_length 512;

  # ── Share machinery: route /m/ and /cards/ to the API service.
  # Crawlers (WhatsApp/Twitter/Facebook/Slack/Discord) hit these paths and
  # need OG-meta HTML or a card PNG response from the API.
  set $api_upstream "api.moanyfans.77-68-52-69.sslip.io";

  location ~ ^/(m|r|recap)/ {
    proxy_pass https://$api_upstream$request_uri;
    proxy_set_header Host $api_upstream;
    proxy_ssl_server_name on;
    proxy_ssl_name $api_upstream;
    proxy_ssl_verify off;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
  }

  location ~ ^/cards/ {
    proxy_pass https://$api_upstream$request_uri;
    proxy_set_header Host $api_upstream;
    proxy_ssl_server_name on;
    proxy_ssl_name $api_upstream;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
  }

  location = /robots.txt {
    proxy_pass https://$api_upstream/robots.txt;
    proxy_set_header Host $api_upstream;
    proxy_ssl_server_name on;
    proxy_ssl_name $api_upstream;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
  }

  location = /sitemap.xml {
    proxy_pass https://$api_upstream/sitemap.xml;
    proxy_set_header Host $api_upstream;
    proxy_ssl_server_name on;
    proxy_ssl_name $api_upstream;
    proxy_ssl_verify off;
    proxy_http_version 1.1;
  }

  # ── Static SPA assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
